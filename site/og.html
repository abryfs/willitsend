<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family: "Archivo"; font-weight: 800; src: url("./fonts/Archivo-800.woff2") format("woff2"); }
  @font-face { font-family: "IBM Plex Mono"; font-weight: 400; src: url("./fonts/IBMPlexMono-400.woff2") format("woff2"); }
  @font-face { font-family: "IBM Plex Mono"; font-weight: 600; src: url("./fonts/IBMPlexMono-600.woff2") format("woff2"); }
  * { margin: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #F7F7F5; color: #1A1D21;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; flex-direction: column; padding: 64px 72px 48px;
  }
  h1 { font-family: "Archivo", sans-serif; font-weight: 800; font-size: 88px; letter-spacing: -0.02em; }
  .stage { flex: 1; display: flex; align-items: center; gap: 48px; margin-top: 8px; }
  .phone { flex: 1; display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
  .bubble {
    max-width: 420px; padding: 18px 24px; border-radius: 26px; border-bottom-right-radius: 6px;
    background: #34C759; color: #fff; font-size: 26px; line-height: 1.4;
    opacity: 0.4; filter: grayscale(0.7);
  }
  .receipts { font-family: "IBM Plex Mono", monospace; font-size: 19px; color: #6B7280; }
  .receipts .never { color: #FF453A; font-weight: 600; }
  .verdict {
    width: 380px; background: #12151A; border-radius: 20px; padding: 28px 30px;
    color: #E8EAED; font-family: "IBM Plex Mono", monospace;
  }
  .verdict .label { font-size: 15px; letter-spacing: 0.12em; text-transform: uppercase; color: #8B939E; }
  .verdict .word { display: inline-block; margin-top: 14px; font-size: 22px; font-weight: 600; letter-spacing: 0.08em; color: #FF453A; border: 2px solid #FF453A; border-radius: 999px; padding: 6px 18px; background: rgba(255,69,58,0.1); }
  .verdict .why { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin-top: 16px; font-size: 20px; color: #B9C0C8; line-height: 1.45; }
  .footer { display: flex; justify-content: space-between; align-items: baseline; font-family: "IBM Plex Mono", monospace; font-size: 20px; color: #6B7280; }
  .footer b { color: #1A1D21; font-weight: 600; }
</style>
</head>
<body>
  <h1>Will it send?</h1>
  <div class="stage">
    <div class="phone">
      <div class="bubble">Hey! Your appointment is tomorrow at 2pm. See you then!</div>
      <div class="receipts">API: "sent" ✓ &nbsp;·&nbsp; <span class="never">phone: may never arrive</span></div>
    </div>
    <div class="verdict">
      <div class="label">carrier-side view</div>
      <div class="word">BLOCK</div>
      <div class="why">Missing opt-out instructions. Carriers silently filter this — no error returned.</div>
    </div>
  </div>
  <div class="footer">
    <span><b>willitsend</b> · preflight for AI agents sending texts</span>
    <span>abryfs.github.io/willitsend</span>
  </div>
</body>
</html>
